services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpg07-bot
    restart: unless-stopped
    # Один процесс на токен: по умолчанию v2 (Docling + пайплайны + Weaviate). Старая версия: command: ["python", "main.py"]
    command: ["python", "hay_v2_bot/main.py"]
    env_file:
      - path: .env
        required: false

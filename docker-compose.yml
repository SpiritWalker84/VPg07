services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpg07-bot
    restart: unless-stopped
    # Один токен = один процесс: v2 — `python -m vpg_telegram.v2`; группа — `python -m vpg_telegram.group`
    command: ["python", "-m", "vpg_telegram.group"]
    env_file:
      - path: .env
        required: false
